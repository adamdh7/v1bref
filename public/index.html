<html lang="fr">
<head>

  <meta name="apple-mobile-web-app-title" content="Bref" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            black: '#000000',
            white: '#ffffff',
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
      -webkit-user-select: none;
      user-select: none;
    }
    .ad-layer {
      pointer-events: auto;
      z-index: 9999;
    }
    #mainUI {
      position: relative;
      z-index: 10001;
      width: 100%;
    }
    #ad-left, #ad-right {
      width: 90px;
      max-width: 120px;
    }
    #ad-top, #ad-bottom {
      height: 90px;
    }
    .ad-frame {
      display: block;
    }
    .ad-layer iframe, .ad-layer > div {
      opacity: 0.98;
    }
    .file-name {
      word-wrap: break-word;
      word-break: break-all;
      white-space: normal;
      line-height: 1.4;
      -webkit-user-select: text;
      user-select: text;
    }
    #result-container {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2147483647;
      width: 100%;
      pointer-events: none;
    }
    .status-msg:empty {
      display: none;
    }
    @media (max-width: 420px) {
      .file-name {
        font-size: 13px;
      }
      .ad-layer {
        display: none;
      }
    }
  </style>
</head>
<body class="relative bg-white dark:bg-black text-black dark:text-white min-h-screen overflow-y-auto overflow-x-hidden flex flex-col items-center">
  
  <div id="result-container">
    <div id="result" class="status-msg"></div>
  </div>

  <div id="mainUI" class="flex flex-col items-center justify-center min-h-screen p-4 sm:p-8 w-full max-w-3xl gap-8 mx-auto">
    
    <div class="w-full space-y-8 flex-1 flex flex-col justify-center py-12">

      <h2 class="text-4xl sm:text-5xl font-extrabold text-center tracking-tight text-black dark:text-white uppercase">Bref</h2>

      <div class="w-full">
        <label id="dropzoneLabel" for="fileInput" class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-300 dark:border-gray-700 border-dashed rounded-2xl cursor-pointer bg-gray-50 dark:bg-black hover:bg-gray-100 dark:hover:bg-gray-900 transition-all duration-200 group">
          <div class="flex flex-col items-center justify-center pt-5 pb-6">
            <svg class="w-10 h-10 mb-4 text-gray-500 dark:text-gray-400 group-hover:text-black dark:group-hover:text-white transition-colors" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
            </svg>
            <p class="mb-1 text-base font-bold text-gray-700 dark:text-gray-300 group-hover:text-black dark:group-hover:text-white transition-colors">Klike oswa trennen fichye isit la</p>
            <p class="text-sm font-medium text-gray-500 dark:text-gray-500">Nenpòt kalite fichye sipòte</p>
          </div>
          <input id="fileInput" type="file" accept="*/*" multiple class="hidden" />
        </label>
      </div>

      <div id="selectedList" class="grid gap-3 w-full empty:hidden"></div>

      <div class="flex gap-3 w-full">
        <button id="uploadBtn" class="flex-1 w-full bg-black dark:bg-white text-white dark:text-black font-extrabold text-lg py-4 rounded-2xl hover:bg-gray-800 dark:hover:bg-gray-200 transition-all active:scale-[0.98]">Upload tout</button>
        <button id="cancelAllBtn" class="w-32 bg-gray-200 dark:bg-gray-800 text-black dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 font-bold py-4 rounded-2xl hidden transition-all active:scale-[0.98]">Anile</button>
      </div>

      <div id="overallProgressWrap" class="hidden w-full bg-gray-50 dark:bg-gray-900 p-5 rounded-2xl border border-gray-200 dark:border-gray-800">
        <div class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider">Pwogrè total</div>
        <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-2 overflow-hidden">
          <div id="overallProgressFill" style="width:0%" class="h-2 rounded-full transition-all duration-300 bg-black dark:bg-white"></div>
        </div>
        <div class="flex justify-between items-center mt-3 text-sm">
          <div id="overallPct" class="font-mono font-bold text-black dark:text-white">0%</div>
          <div id="overallInfo" class="text-gray-600 dark:text-gray-400 font-medium"></div>
        </div>
      </div>

      <div id="previewAll" class="space-y-4 w-full empty:hidden pb-12"></div>

    </div>
  </div>

  <div id="ad-top" class="ad-layer fixed top-0 left-0 w-full flex justify-center items-start"></div>
  <div id="ad-left" class="ad-layer fixed top-1/4 left-0 h-1/2 flex items-center"></div>
  <div id="ad-right" class="ad-layer fixed top-1/4 right-0 h-1/2 flex items-center"></div>
  <div id="ad-bottom" class="ad-layer fixed bottom-0 left-0 w-full flex justify-center items-end"></div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropzoneLabel = document.getElementById('dropzoneLabel');
    const selectedList = document.getElementById('selectedList');
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelAllBtn = document.getElementById('cancelAllBtn');
    const result = document.getElementById('result');
    const overallProgressWrap = document.getElementById('overallProgressWrap');
    const overallProgressFill = document.getElementById('overallProgressFill');
    const overallPct = document.getElementById('overallPct');
    const overallInfo = document.getElementById('overallInfo');
    const previewAll = document.getElementById('previewAll');

    let filesArray = [];
    let xhrs = new Map();
    let uploading = false;
    let hasUploaded = false;
    let statusTimeout = null;

    function humanFileSize(bytes) {
      const thresh = 1024;
      if (Math.abs(bytes) < thresh) return bytes + ' B';
      const units = ['KB','MB','GB','TB','PB','EB','ZB','YB'];
      let u = -1;
      do {
        bytes /= thresh;
        ++u;
      } while(Math.abs(bytes) >= thresh && u < units.length - 1);
      return bytes.toFixed(1)+' '+units[u];
    }

    function escapeHtml(unsafe) {
      return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showStatus(message, type) {
      result.textContent = message;
      result.className = 'status-msg text-center text-xl md:text-2xl font-black w-full transition-opacity duration-300 tracking-wide';
      result.style.textShadow = '0px 2px 15px rgba(0,0,0,0.9)';
      
      if (type === 'success') {
        result.classList.add('text-green-500');
      } else if (type === 'error') {
        result.classList.add('text-red-500');
      } else {
        result.classList.add('text-white');
      }
      
      if (statusTimeout) {
        clearTimeout(statusTimeout);
      }
      statusTimeout = setTimeout(clearStatus, 7000);
    }

    function clearStatus() {
      result.textContent = '';
      result.className = 'status-msg';
      result.style.textShadow = 'none';
    }

    function renderSelectedList() {
      selectedList.innerHTML = '';
      if (filesArray.length === 0) {
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'space-y-3 w-full';

      filesArray.forEach((file, idx) => {
        const row = document.createElement('div');
        row.className = 'flex items-center justify-between gap-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-4 w-full transition-all hover:border-gray-300 dark:hover:border-gray-700';

        const left = document.createElement('div');
        left.className = 'flex items-center gap-4 w-full min-w-0';

        const icon = document.createElement('div');
        icon.className = 'w-12 h-12 flex-shrink-0 rounded-xl bg-gray-200 dark:bg-black border border-gray-300 dark:border-gray-700 flex items-center justify-center text-xs font-bold text-black dark:text-white uppercase tracking-wider';
        icon.textContent = file.type && file.type.startsWith('video') ? 'VID' : 'FILE';

        const titleWrap = document.createElement('div');
        titleWrap.className = 'flex-1 min-w-0 flex flex-col justify-center';

        const title = document.createElement('div');
        title.className = 'file-name text-sm sm:text-base font-bold text-black dark:text-white';
        title.textContent = file.name;

        const sub = document.createElement('div');
        sub.className = 'text-xs font-medium text-gray-500 dark:text-gray-400 mt-1';
        sub.textContent = `${humanFileSize(file.size)} • ${file.type || '—'}`;

        titleWrap.appendChild(title);
        titleWrap.appendChild(sub);
        left.appendChild(icon);
        left.appendChild(titleWrap);

        const right = document.createElement('div');
        right.className = 'flex items-center flex-shrink-0 pl-2';

        const removeBtn = document.createElement('button');
        removeBtn.className = 'w-10 h-10 flex items-center justify-center rounded-full bg-gray-200 dark:bg-gray-800 text-black dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors';
        removeBtn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
        removeBtn.onclick = () => {
          if (uploading) return;
          filesArray.splice(idx, 1);
          renderSelectedList();
        };

        right.appendChild(removeBtn);
        row.appendChild(left);
        row.appendChild(right);
        grid.appendChild(row);
      });

      selectedList.appendChild(grid);
    }

    fileInput.addEventListener('change', (e) => {
      if (hasUploaded) {
        filesArray = [];
        previewAll.innerHTML = '';
        overallProgressWrap.classList.add('hidden');
        hasUploaded = false;
      }
      
      const list = Array.from(e.target.files || []);
      filesArray = filesArray.concat(list);
      renderSelectedList();
    });

    uploadBtn.addEventListener('click', async () => {
      if (filesArray.length === 0) {
        showStatus('Tanpri chwazi omwen yon fichye anvan ou upload.', 'error');
        return;
      }
      if (uploading) return;
      
      uploading = true;
      hasUploaded = false;
      
      uploadBtn.disabled = true;
      uploadBtn.classList.add('opacity-50', 'cursor-not-allowed');
      cancelAllBtn.classList.remove('hidden');
      
      fileInput.disabled = true;
      dropzoneLabel.classList.add('pointer-events-none', 'opacity-50');
      
      showStatus('Kòmanse upload...', 'normal');

      selectedList.innerHTML = ''; 
      overallProgressWrap.classList.remove('hidden');
      overallInfo.textContent = '';
      previewAll.innerHTML = '';
      xhrs.clear();

      const totalBytes = filesArray.reduce((s,f) => s + f.size, 0);
      const loadedBytes = new Array(filesArray.length).fill(0);

      const blocks = filesArray.map((file, i) => {
        const block = document.createElement('div');
        block.className = 'p-5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl w-full transition-colors';
        block.innerHTML = `
          <div class="flex items-start justify-between gap-3 w-full min-w-0">
            <div class="flex-1 min-w-0">
              <div class="font-bold text-sm sm:text-base text-black dark:text-white file-name">${escapeHtml(file.name)}</div>
              <div class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-1">${humanFileSize(file.size)}</div>
            </div>
            <div class="flex-shrink-0">
              <button class="text-xs font-bold text-black dark:text-white px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 hidden file-cancel transition-colors">Anile</button>
            </div>
          </div>
          <div class="mt-4">
            <div class="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-2 overflow-hidden">
              <div class="file-progress h-2 rounded-full transition-all bg-black dark:bg-white" style="width:0%"></div>
            </div>
            <div class="flex justify-between items-center mt-3 text-sm font-medium">
              <div class="file-pct font-mono text-black dark:text-white">0%</div>
              <div class="file-info text-gray-500 dark:text-gray-400"></div>
            </div>
            <div class="mt-4 file-result w-full min-w-0 empty:hidden"></div>
          </div>
        `;
        previewAll.appendChild(block);
        return {
          block,
          fileProgressFill: block.querySelector('.file-progress'),
          filePct: block.querySelector('.file-pct'),
          fileInfo: block.querySelector('.file-info'),
          fileCancelBtn: block.querySelector('.file-cancel'),
          fileResult: block.querySelector('.file-result')
        };
      });

      function updateOverall() {
        const sum = loadedBytes.reduce((a,b) => a + b, 0);
        const overallPercent = totalBytes ? Math.round((sum / totalBytes) * 100) : 0;
        overallProgressFill.style.width = overallPercent + '%';
        overallPct.textContent = overallPercent + '%';
        overallInfo.textContent = `${humanFileSize(sum)} / ${humanFileSize(totalBytes)}`;
      }

      const uploadPromises = filesArray.map((file, i) => {
        const ui = blocks[i];
        return uploadSingleFile(file, i, {
          onProgress: (loaded, total, speed, secsLeft) => {
            const percent = total ? Math.round((loaded/total)*100) : 0;
            ui.fileProgressFill.style.width = percent + '%';
            ui.filePct.textContent = percent + '%';
            ui.fileInfo.textContent = `${humanFileSize(loaded)} / ${humanFileSize(total)}`;
            loadedBytes[i] = loaded;
            updateOverall();
          },
          onXhrCreated: (xhr) => {
            xhrs.set(i, xhr);
            ui.fileCancelBtn.classList.remove('hidden');
            ui.fileCancelBtn.onclick = () => {
              try { xhr.abort(); } catch(e) {}
            };
          }
        }).then(url => {
          loadedBytes[i] = file.size;
          updateOverall();
          ui.fileProgressFill.style.width = '100%';
          ui.filePct.textContent = '100%';
          ui.fileInfo.textContent = `Konplete`;
          ui.fileCancelBtn.classList.add('hidden');

          const div = document.createElement('div');
          div.className = 'mt-3 p-4 bg-white dark:bg-black border border-gray-200 dark:border-gray-800 rounded-xl w-full flex items-center justify-between gap-2 file-url-container';
          
          const urlDiv = document.createElement('div');
          urlDiv.className = 'file-name text-black dark:text-white text-sm font-bold flex-1 cursor-pointer transition-opacity hover:opacity-75';
          urlDiv.textContent = url;
          urlDiv.onclick = () => {
            navigator.clipboard.writeText(url).then(() => {
              showStatus('URL kopye avek siksè', 'success');
            }).catch(() => {
              showStatus('Erè kopye', 'error');
            });
          };
          div.appendChild(urlDiv);
          ui.fileResult.appendChild(div);

          const type = (file.type || '').toLowerCase();
          if (type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'mt-4 mx-auto rounded-xl border border-gray-200 dark:border-gray-800 max-h-64 object-contain w-full bg-white dark:bg-black';
            ui.fileResult.appendChild(img);
          } else if (type.startsWith('video/') || type.startsWith('audio/')) {
            const vid = document.createElement('video');
            vid.src = url;
            vid.controls = true;
            vid.className = 'mt-4 mx-auto rounded-xl border border-gray-200 dark:border-gray-800 max-h-64 w-full bg-black';
            ui.fileResult.appendChild(vid);
          }
          return { status: 'fulfilled', url };
        }).catch(err => {
          ui.fileCancelBtn.classList.add('hidden');
          if (err && err.isAbort) {
            ui.fileInfo.textContent = '';
            ui.filePct.textContent = '—';
            ui.fileProgressFill.style.width = '0%';
            const errDiv = document.createElement('div');
            errDiv.className = 'text-sm font-bold text-gray-500 dark:text-gray-400 mt-3 file-name p-3 bg-gray-100 dark:bg-gray-800 rounded-lg text-center';
            errDiv.textContent = 'Upload anile pa itilizatè';
            ui.fileResult.appendChild(errDiv);
            return { status: 'aborted' };
          } else {
            ui.fileInfo.textContent = '';
            ui.filePct.textContent = '—';
            ui.fileProgressFill.style.width = '0%';
            const errDiv = document.createElement('div');
            errDiv.className = 'text-sm font-bold text-gray-600 dark:text-gray-300 mt-3 file-name p-3 bg-gray-200 dark:bg-gray-800 rounded-lg text-center border border-gray-300 dark:border-gray-700';
            errDiv.textContent = 'Erè upload: ' + (err && err.message ? err.message : String(err));
            ui.fileResult.appendChild(errDiv);
            return { status: 'rejected', reason: err };
          }
        });
      });

      const results = await Promise.allSettled(uploadPromises);

      uploading = false;
      hasUploaded = true;
      
      uploadBtn.disabled = false;
      uploadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      cancelAllBtn.classList.add('hidden');
      
      fileInput.disabled = false;
      dropzoneLabel.classList.remove('pointer-events-none', 'opacity-50');

      const succeeded = results.filter(r => r.status === 'fulfilled' && r.value && r.value.status === 'fulfilled').length;
      const aborted = results.filter(r => r.status === 'fulfilled' && r.value && r.value.status === 'aborted').length;
      const failed = results.filter(r => r.status === 'fulfilled' && r.value && r.value.status === 'rejected').length;
      overallInfo.textContent = `Konplete: ${humanFileSize(loadedBytes.reduce((a,b)=>a+b,0))}`;
      
      if (failed > 0) {
        showStatus(`Fen: ${succeeded} siksè, ${failed} erè, ${aborted} anile.`, 'error');
      } else {
        showStatus(`Fen: ${succeeded} siksè, 0 erè.`, 'success');
      }
    });

    cancelAllBtn.addEventListener('click', () => {
      for (const xhr of xhrs.values()) {
        try { xhr.abort(); } catch(e) {}
      }
      xhrs.clear();
      showStatus('Anile tout uploads...', 'normal');
    });

    function uploadSingleFile(file, index, { onProgress = ()=>{}, onXhrCreated = ()=>{} } = {}) {
      return new Promise((resolve, reject) => {
        const endpoint = `/upload`;
        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        let startTime = Date.now();
        xhr.open('POST', endpoint);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = e.loaded / Math.max(elapsed, 0.001);
            const remainingBytes = e.total - e.loaded;
            const secsLeft = Math.round(remainingBytes / Math.max(speed, 1));
            onProgress(e.loaded, e.total, speed, secsLeft);
          }
        };

        xhr.onload = () => {
          xhrs.delete(index);
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              const data = JSON.parse(xhr.responseText || '{}');
              const url = data.url || data.fileUrl || data.path || data.location || '';
              if (url) {
                resolve(url);
              } else {
                const text = (xhr.responseText || '').trim();
                if (text) resolve(text);
                else reject(new Error('Repons sèvè pa gen URL'));
              }
            } catch (err) {
              const text = (xhr.responseText || '').trim();
              if (text) resolve(text);
              else reject(new Error('Erè parse repons sèvè: ' + err.message));
            }
          } else {
            reject(new Error('HTTP ' + xhr.status));
          }
        };

        xhr.onerror = () => {
          xhrs.delete(index);
          reject(new Error('Erè rezo pandan upload'));
        };

        xhr.onabort = () => {
          xhrs.delete(index);
          const err = new Error('Abòte pa itilizatè');
          err.isAbort = true;
          reject(err);
        };

        onXhrCreated(xhr);

        try {
          xhr.send(formData);
        } catch (err) {
          reject(err);
        }
      });
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
