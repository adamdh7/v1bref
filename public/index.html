      </div>

      <div id="overallProgressWrap" class="mt-2 hidden w-full">
        <div class="text-xs text-gray-600 dark:text-gray-400 mb-1">Pwogrè total</div>

      </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const selectedList = document.getElementById('selectedList');
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelAllBtn = document.getElementById('cancelAllBtn');
    const result = document.getElementById('result');
    const overallProgressWrap = document.getElementById('overallProgressWrap');
    const overallProgressFill = document.getElementById('overallProgressFill');
    const overallPct = document.getElementById('overallPct');
    const overallInfo = document.getElementById('overallInfo');
    const previewAll = document.getElementById('previewAll');

    let filesArray = [];
    let xhrs = new Map();
    let uploading = false;

    function humanFileSize(bytes) {
      const thresh = 1024;
      if (Math.abs(bytes) < thresh) return bytes + ' B';
      const units = ['KB','MB','GB','TB','PB','EB','ZB','YB'];
      let u = -1;
      do {
        bytes /= thresh;
        ++u;
      } while(Math.abs(bytes) >= thresh && u < units.length - 1);
      return bytes.toFixed(1)+' '+units[u];
    }

    function escapeHtml(unsafe) {
      return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderSelectedList() {
      selectedList.innerHTML = '';
      if (filesArray.length === 0) {
        selectedList.innerHTML = `<div class="text-xs text-gray-500 dark:text-gray-400 italic text-center">Pa gen fichye chwazi.</div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'space-y-2 w-full';

      filesArray.forEach((file, idx) => {
        const row = document.createElement('div');
        row.className = 'flex items-start justify-between gap-3 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl p-3 w-full transition-colors';

        const left = document.createElement('div');
        left.className = 'flex items-start gap-3 w-full min-w-0';

        const icon = document.createElement('div');
        icon.className = 'w-10 h-10 flex-shrink-0 rounded-lg bg-gray-200 dark:bg-gray-600 flex items-center justify-center text-xs font-bold text-gray-600 dark:text-gray-300';
        icon.textContent = file.type && file.type.startsWith('video') ? 'VID' : 'FILE';

        const titleWrap = document.createElement('div');
        titleWrap.className = 'flex-1 min-w-0 flex flex-col';

        const title = document.createElement('div');
        title.className = 'file-name text-sm font-medium text-gray-800 dark:text-gray-100';
        title.textContent = file.name;

        const sub = document.createElement('div');
        sub.className = 'text-xs text-gray-500 dark:text-gray-400 mt-1';
        sub.textContent = `${humanFileSize(file.size)} • ${file.type || '—'}`;

        titleWrap.appendChild(title);
        titleWrap.appendChild(sub);
        left.appendChild(icon);
        left.appendChild(titleWrap);

        const right = document.createElement('div');
        right.className = 'flex items-center flex-shrink-0';

        const removeBtn = document.createElement('button');
        removeBtn.className = 'text-xs font-semibold text-red-600 dark:text-red-400 px-3 py-1.5 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-100 dark:border-red-800 hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors';
        removeBtn.textContent = 'Retire';
        removeBtn.onclick = () => {
          if (uploading) return;
          filesArray.splice(idx, 1);
          renderSelectedList();
        };

        right.appendChild(removeBtn);
        row.appendChild(left);
        row.appendChild(right);
        grid.appendChild(row);
      });

      selectedList.appendChild(grid);
    }

    fileInput.addEventListener('change', (e) => {
      const list = Array.from(e.target.files || []);
      filesArray = filesArray.concat(list);
      renderSelectedList();
    });

    uploadBtn.addEventListener('click', async () => {
      if (filesArray.length === 0) {
        return alert('Tanpri chwazi omwen yon fichye anvan ou upload.');
      }
      if (uploading) return;
      uploading = true;
      uploadBtn.disabled = true;
      cancelAllBtn.classList.remove('hidden');
      fileInput.disabled = true;
      result.textContent = 'Kòmanse upload...';

      overallProgressWrap.classList.remove('hidden');
      overallInfo.textContent = '';
      previewAll.innerHTML = '';
      xhrs.clear();

      const totalBytes = filesArray.reduce((s,f) => s + f.size, 0);
      const loadedBytes = new Array(filesArray.length).fill(0);

      const blocks = filesArray.map((file, i) => {
        const block = document.createElement('div');
        block.className = 'p-4 bg-gray-50 dark:bg-gray-700/30 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm w-full transition-colors';
        block.innerHTML = `
          <div class="flex items-start justify-between gap-3 w-full min-w-0">
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm text-gray-800 dark:text-gray-100 file-name">${escapeHtml(file.name)}</div>
              <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">${humanFileSize(file.size)} • ${file.type || '—'}</div>
            </div>
            <div class="flex-shrink-0">
              <button class="text-xs font-semibold text-gray-600 dark:text-gray-300 px-3 py-1.5 rounded-lg bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 hidden file-cancel transition-colors">Anile</button>
            </div>
          </div>
          <div class="mt-4">
            <div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-2 overflow-hidden">
              <div class="file-progress h-2 rounded-full transition-all bg-blue-500" style="width:0%"></div>
            </div>
            <div class="flex justify-between items-center mt-2 text-xs">
              <div class="file-pct font-mono text-sm dark:text-gray-200">0%</div>
              <div class="file-info text-gray-500 dark:text-gray-400"></div>
            </div>
            <div class="mt-3 file-result w-full min-w-0"></div>
          </div>
        `;
        previewAll.appendChild(block);
        return {
          block,
          fileProgressFill: block.querySelector('.file-progress'),
          filePct: block.querySelector('.file-pct'),
          fileInfo: block.querySelector('.file-info'),
          fileCancelBtn: block.querySelector('.file-cancel'),
          fileResult: block.querySelector('.file-result')
        };
      });

      function updateOverall() {
        const sum = loadedBytes.reduce((a,b) => a + b, 0);
        const overallPercent = totalBytes ? Math.round((sum / totalBytes) * 100) : 0;
        overallProgressFill.style.width = overallPercent + '%';
        overallPct.textContent = overallPercent + '%';
        overallInfo.textContent = `${humanFileSize(sum)} / ${humanFileSize(totalBytes)}`;
      }

      const uploadPromises = filesArray.map((file, i) => {
        const ui = blocks[i];
        return uploadSingleFile(file, i, {
          onProgress: (loaded, total, speed, secsLeft) => {
            const percent = total ? Math.round((loaded/total)*100) : 0;
            ui.fileProgressFill.style.width = percent + '%';
            ui.filePct.textContent = percent + '%';
            ui.fileInfo.textContent = `${humanFileSize(loaded)} / ${humanFileSize(total)} • ${Math.round(secsLeft)}s left`;
            loadedBytes[i] = loaded;
            updateOverall();
          },
          onXhrCreated: (xhr) => {
            xhrs.set(i, xhr);
            ui.fileCancelBtn.classList.remove('hidden');
            ui.fileCancelBtn.onclick = () => {
              try { xhr.abort(); } catch(e) {}
            };
          }
        }).then(url => {
          loadedBytes[i] = file.size;
          updateOverall();
          ui.fileProgressFill.style.width = '100%';
          ui.filePct.textContent = '100%';
          ui.fileInfo.textContent = `${humanFileSize(file.size)} • Konplete`;
          ui.fileCancelBtn.classList.add('hidden');

          const div = document.createElement('div');
          div.className = 'mt-3 p-3 bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800 rounded-lg w-full';
          const urlDisplay = `<div class="file-name text-blue-600 dark:text-blue-400 text-sm font-medium cursor-pointer file-url">${escapeHtml(url)}</div>`;
          div.innerHTML = urlDisplay;
          ui.fileResult.appendChild(div);

          const urlEl = ui.fileResult.querySelector('.file-url');
          urlEl.onclick = async () => {
            try {
              await navigator.clipboard.writeText(url);
              result.innerHTML = '<span class="copied">URL kopi nan clipboard</span>';
              setTimeout(()=> result.textContent = '', 2000);
            } catch (e) {
              result.textContent = 'Pa kapab kopiye: ' + e.message;
            }
          };

          const type = (file.type || '').toLowerCase();
          if (type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'mt-3 mx-auto rounded-lg shadow-md max-h-44 object-contain';
            ui.fileResult.appendChild(img);
          } else if (type.startsWith('video/') || type.startsWith('audio/')) {
            const vid = document.createElement('video');
            vid.src = url;
            vid.controls = true;
            vid.className = 'mt-3 mx-auto rounded-lg shadow-md max-h-44 w-full bg-black';
            ui.fileResult.appendChild(vid);
          }
          return { status: 'fulfilled', url };
        }).catch(err => {
          ui.fileCancelBtn.classList.add('hidden');
          if (err && err.isAbort) {
            ui.fileInfo.textContent = '';
            ui.filePct.textContent = '—';
            ui.fileProgressFill.style.width = '0%';
            const errDiv = document.createElement('div');
            errDiv.className = 'text-sm font-medium text-red-600 dark:text-red-400 mt-2 file-name';
            errDiv.textContent = 'Upload anile pa itilizatè';
            ui.fileResult.appendChild(errDiv);
            return { status: 'aborted' };
          } else {
            ui.fileInfo.textContent = '';
            ui.filePct.textContent = '—';
            ui.fileProgressFill.style.width = '0%';
            const errDiv = document.createElement('div');
            errDiv.className = 'text-sm font-medium text-red-600 dark:text-red-400 mt-2 file-name';
            errDiv.textContent = 'Erè upload: ' + (err && err.message ? err.message : String(err));
            ui.fileResult.appendChild(errDiv);
            return { status: 'rejected', reason: err };
          }
        });
      });

      const results = await Promise.allSettled(uploadPromises);

      uploading = false;
      uploadBtn.disabled = false;
      cancelAllBtn.classList.add('hidden');
      fileInput.disabled = false;

      const succeeded = results.filter(r => r.status === 'fulfilled' && r.value && r.value.status === 'fulfilled').length;
      const aborted = results.filter(r => r.status === 'fulfilled' && r.value && r.value.status === 'aborted').length;
      const failed = results.filter(r => r.status === 'fulfilled' && r.value && r.value.status === 'rejected').length;
      overallInfo.textContent = `Konplete: ${humanFileSize(loadedBytes.reduce((a,b)=>a+b,0))}`;
      result.textContent = `Fen: ${succeeded} siksè, ${failed} erè, ${aborted} anile.`;
    });

    cancelAllBtn.addEventListener('click', () => {
      for (const xhr of xhrs.values()) {
        try { xhr.abort(); } catch(e) {}
      }
      xhrs.clear();
      result.textContent = 'Anile tout uploads...';
    });

    function uploadSingleFile(file, index, { onProgress = ()=>{}, onXhrCreated = ()=>{} } = {}) {
      return new Promise((resolve, reject) => {
        const endpoint = `/upload`;
        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        let startTime = Date.now();
        xhr.open('POST', endpoint);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = e.loaded / Math.max(elapsed, 0.001);
            const remainingBytes = e.total - e.loaded;
            const secsLeft = Math.round(remainingBytes / Math.max(speed, 1));
            onProgress(e.loaded, e.total, speed, secsLeft);
          }
        };

        xhr.onload = () => {
          xhrs.delete(index);
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              const data = JSON.parse(xhr.responseText || '{}');
              const url = data.url || data.fileUrl || data.path || data.location || '';
              if (url) {
                resolve(url);
              } else {
                const text = (xhr.responseText || '').trim();
                if (text) resolve(text);
                else reject(new Error('Repons sèvè pa gen URL'));
              }
            } catch (err) {
              const text = (xhr.responseText || '').trim();
              if (text) resolve(text);
              else reject(new Error('Erè parse repons sèvè: ' + err.message));
            }
          } else {
            reject(new Error('HTTP ' + xhr.status));
          }
        };

        xhr.onerror = () => {
          xhrs.delete(index);
          reject(new Error('Erè rezo pandan upload'));
        };

        xhr.onabort = () => {
          xhrs.delete(index);
          const err = new Error('Abòte pa itilizatè');
          err.isAbort = true;
          reject(err);
        };

        onXhrCreated(xhr);

        try {
          xhr.send(formData);
        } catch (err) {
          reject(err);
        }
      });
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => {
            console.log('SW', reg);
          })
          .catch(err => {
            console.warn('SW ERR', err);
          });
      });
    }
  </script>

    function isSocialOrEmail(url) {

            'gmail.com', 'outlook.com', 'hotmail.com', 'yahoo.com', 'mail.google.com',
            'twitter.com', 'x.com', 'linkedin.com', 'tiktok.com', 'snapchat.com', 'whatsapp.com',
            'wa.me', 'api.whatsapp.com', 'chat.whatsapp.com', 'web.whatsapp.com',
            'v.whatsapp.com', 'business.whatsapp.com', 'mailto:'
        ];
        return patterns.some(p => url.toLowerCase().includes(p));
    }

    function openInNewTab() {
        let urlToOpen = currentActiveUrl;
        try {
            if (iframe.contentWindow.location.href && iframe.contentWindow.location.href !== 'about:blank') {
                urlToOpen = iframe.contentWindow.location.href;
            }
        } catch(e) {}
        
        if (!urlToOpen || urlToOpen === 'about:blank') {
            urlToOpen = iframe.src;
        }

        if (urlToOpen && urlToOpen !== 'about:blank') {
            const a = document.createElement('a');
            a.href = urlToOpen;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            exitUI();
        }
    }

    function launchUrl(url) {
        if (!url || url === 'undefined' || url === '#' || url === 'about:blank') return;
        
        if (url.toLowerCase().includes('.apk') || isSocialOrEmail(url)) {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            return;
        }

        isInitialLoad = true;
        currentActiveUrl = url;
        iframe.src = url;
        container.classList.add('active');
        hStack = 1;
        fStack = 0;
        syncNav();
    }

    function exitUI() {
        container.classList.remove('active');
        container.style.transform = 'translateY(0)';
        hStack = 0;
        fStack = 0;
        currentActiveUrl = '';
        syncNav();
        setTimeout(() => { 
            iframe.removeAttribute('src'); 
            iframe.src = 'about:blank'; 
        }, 400);
    }

    btnBack.onclick = () => {
        try {
            isNavigatingHistory = true;
            iframe.contentWindow.history.back();
            hStack = Math.max(1, hStack - 1);
            fStack++;
            syncNav();
            setTimeout(() => isNavigatingHistory = false, 500);
        } catch(e) {}
    };

    btnFwd.onclick = () => {
        try {
            isNavigatingHistory = true;
            iframe.contentWindow.history.forward();
            fStack = Math.max(0, fStack - 1);
            hStack++;
            syncNav();
            setTimeout(() => isNavigatingHistory = false, 500);
        } catch(e) {}
    };

    btnClose.onclick = exitUI;

    iframe.onload = () => {
        if (iframe.src && !iframe.src.includes('about:blank')) {
            if (isInitialLoad) {
                isInitialLoad = false;
            } else if (!isNavigatingHistory) {
                hStack++;
                fStack = 0;
                syncNav();
            }
            try {
                currentActiveUrl = iframe.contentWindow.location.href;
            } catch(e) {}
        }
    };

    document.addEventListener('click', (e) => {
        const link = e.target.closest('a');
        if (link && link.href) {
            const targetAttr = link.getAttribute('target');
            if (targetAttr === '_blank' || targetAttr === '_new' || e.ctrlKey || e.metaKey) {
                if (link.href.toLowerCase().includes('.apk') || isSocialOrEmail(link.href)) {
                    return;
                }
                e.preventDefault();
                e.stopPropagation();
                launchUrl(link.href);
            }
        }
    }, true);

    const originalWindowOpen = window.open;
    window.open = function(url, target, features) {
        if (url) {
            if (url.toLowerCase().includes('.apk') || isSocialOrEmail(url)) {
                return originalWindowOpen.call(window, url, '_blank', features);
            }
            launchUrl(url);
            return null;
        }
    };

    let sY = 0;
    let isMoving = false;

    function dragInit(e) {
        sY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        isMoving = false;
        
        const dragMove = (ev) => {
            let mY = ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY;
            let delta = mY - sY;
            if (delta > 5) {
                isMoving = true;
                container.style.transition = 'none';
                container.style.transform = `translateY(${delta}px)`;
            }
            if (delta > 250) dragEnd(true);
        };

        const dragEnd = (close) => {
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);
            container.style.transition = 'bottom 0.4s ease, transform 0.2s ease';
            
            if (close === true) {
                exitUI();
            } else {
                if (!isMoving) {
                    openInNewTab();
                }
                container.style.transform = 'translateY(0)';
            }
        };

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('touchmove', dragMove);
        document.addEventListener('mouseup', () => dragEnd(false), { once: true });
        document.addEventListener('touchend', () => dragEnd(false), { once: true });
    }

    dragHandle.addEventListener('mousedown', dragInit);
    dragHandle.addEventListener('touchstart', dragInit);
})();
  </script>
</body>
</html>
